<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebP Converter</title>
    
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
</head>
<body>

<div class="container">
    <h1>WebP Converter</h1>
    
    <label for="upload" class="upload-area" id="drop-zone">
        <span id="drop-text">Click, Drag, or Paste (CTRL+V) an image here</span>
        <img id="preview-image" src="" alt="Image Preview" style="display: none;">
    </label>
    <input type="file" id="upload" accept="image/*">
    
    <div id="progress-wrap" class="progress-wrap" style="display:none;">
        <div id="progress-bar" class="progress-bar"></div>
    </div>
    
    <button id="convert-btn" disabled>Convert to WebP</button>
    
    <a id="download-link" class="download-btn" style="display:none;">Download WebP</a>
    <div id="stats" style="display:none;"></div>
    <button id="reset-btn" class="secondary-btn" style="display:none;">Convert Another</button>
</div>

<script src="script.js?v=3"></script>
</body>
</html>
