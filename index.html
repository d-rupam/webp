<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codon | WebP Converter</title>
    
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
</head>
<body>

<div class="container">
    <h1>WebP Converter</h1>
    
    <label for="upload" class="upload-area" id="drop-zone">Click to select image</label>
    <input type="file" id="upload" accept="image/*">
    
    <button id="convert-btn" disabled>Convert to WebP</button>
    
    <div id="progress-wrap" class="progress-wrap">
        <div id="progress-bar" class="progress-bar"></div>
    </div>
    
    <a id="download-link" class="download-btn" style="display:none;">Download WebP</a>

    <div id="stats"></div>
</div>

<script src="script.js?v=2"></script>
</body>
</html>
