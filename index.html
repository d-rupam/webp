<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codon | WebP Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        h1 { margin-top: 0; color: var(--primary); }
        .box { border: 2px dashed #475569; padding: 2rem; border-radius: 0.5rem; margin: 1rem 0; cursor: pointer; transition: 0.3s; }
        .box:hover { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-weight: bold; margin-top: 1rem; width: 100%; display: none; }
        #stats { margin-top: 1rem; font-size: 0.9rem; color: #94a3b8; }
        #upload { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧬 Codon Engine</h1>
    <label for="upload" class="box">Click to select image</label>
    <input type="file" id="upload" accept="image/*">
    <div id="stats"></div>
    <a id="download" style="text-decoration:none;"><button id="btn">Download WebP</button></a>
</div>

<script>
    const upload = document.getElementById('upload');
    const btn = document.getElementById('btn');
    const stats = document.getElementById('stats');
    const download = document.getElementById('download');

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        new Compressor(file, {
            quality: 0.8,
            mimeType: 'image/webp',
            success(result) {
                const url = URL.createObjectURL(result);
                download.href = url;
                download.download = file.name.replace(/\.[^/.]+$/, "") + ".webp";
                btn.style.display = 'block';
                
                const initialSize = (file.size / 1024).toFixed(2);
                const finalSize = (result.size / 1024).toFixed(2);
                const saved = (((file.size - result.size) / file.size) * 100).toFixed(1);
                
                stats.innerHTML = `Original: ${initialSize}KB<br>Converted: ${finalSize}KB<br><b>Saved: ${saved}%</b>`;
            },
        });
    });
</script>
</body>
</html>
